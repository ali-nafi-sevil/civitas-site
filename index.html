<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnum Opus — Civitas Cerebrum</title>
  <meta name="description" content="Autonomous QA. Bugs in. Order out." />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0a0a14;
      --ink-deep: #050509;
      --bone: #f5ece3;
      --bone-muted: #9a9a8e;
      --bone-faint: #5a5a52;
      --copper: #b87333;
      --copper-bright: #d97706;
      --gold: #d4a72c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: var(--bone);
      font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      cursor: pointer;
      -webkit-font-smoothing: antialiased;
    }
    #scene {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 1;
    }
    .vignette {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%),
        radial-gradient(ellipse at center, transparent 70%, rgba(10,5,15,0.5) 100%);
    }
    .overlay {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 3;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 32px clamp(20px, 5vw, 64px);
    }
    .top-bar {
      display: flex; align-items: center; gap: 14px;
      opacity: 0; transform: translateY(-8px);
      animation: fadeDown 0.7s ease 0.15s forwards;
    }
    .top-bar img {
      width: 38px; height: 38px; border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6), 0 0 0 1px rgba(184,115,51,0.3);
    }
    .brand-words { display: flex; flex-direction: column; line-height: 1.1; }
    .wm {
      font-family: "Fraunces", Georgia, serif;
      font-size: 18px; font-weight: 600;
      color: var(--bone);
      letter-spacing: 0.005em;
    }
    .sub {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--bone-faint);
      margin-top: 3px;
    }
    .center {
      align-self: center;
      justify-self: center;
      text-align: center;
      max-width: 760px;
      padding: 0 12px;
      transform: translateY(-2vh);
    }
    .eyebrow {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px; letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--copper-bright);
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }
    .eyebrow .num { color: var(--bone-muted); margin-right: 6px; }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: clamp(40px, 7.2vw, 92px);
      line-height: 1.0; letter-spacing: -0.028em;
      color: var(--bone);
      text-shadow: 0 4px 40px rgba(0,0,0,0.85), 0 2px 8px rgba(0,0,0,0.6);
      opacity: 0;
      animation: fadeUp 1.0s ease 0.6s forwards;
    }
    h1 .italic {
      font-style: italic;
      color: var(--copper-bright);
      font-weight: 500;
    }
    .tagline {
      margin-top: 24px;
      font-size: clamp(15px, 1.55vw, 18px);
      color: var(--bone-muted);
      letter-spacing: 0.005em;
      line-height: 1.55;
      opacity: 0;
      animation: fadeUp 1.0s ease 0.9s forwards;
    }
    .tagline strong { color: var(--bone); font-weight: 500; }
    .bottom {
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 20px;
      opacity: 0;
      animation: fadeIn 0.9s ease 1.3s forwards;
    }
    .hint {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px; letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--bone-muted);
    }
    .hint .pulse {
      display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--copper-bright);
      margin-right: 12px; vertical-align: middle;
      box-shadow: 0 0 12px rgba(217,119,6,0.7);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .skip {
      pointer-events: auto;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px; letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--bone-muted);
      background: rgba(245,236,227,0.03);
      border: 1px solid rgba(245,236,227,0.18);
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }
    .skip:hover {
      border-color: var(--copper-bright);
      color: var(--bone);
      background: rgba(217,119,6,0.08);
    }
    .fade {
      position: fixed; inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.0s cubic-bezier(0.7, 0, 0.84, 0);
      z-index: 10;
    }
    .fade.on { opacity: 1; }
    .nojs {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      z-index: 20; background: var(--ink);
      font-family: "Fraunces", Georgia, serif;
      color: var(--bone);
    }
    .nojs a { color: var(--copper-bright); }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes fadeDown {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.35); }
    }

    @media (max-width: 640px) {
      .overlay { padding: 22px 18px; }
      .wm { font-size: 16px; }
      .sub { font-size: 9px; }
      .top-bar img { width: 34px; height: 34px; }
      .center { transform: translateY(-4vh); }
    }

    @media (prefers-reduced-motion: reduce) {
      .top-bar, .eyebrow, h1, .tagline, .bottom { animation-duration: 0.01s; }
      .hint .pulse { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <noscript>
    <div class="nojs">
      <div>Magnum Opus</div>
      <a href="site.html">Enter the site →</a>
    </div>
  </noscript>

  <canvas id="scene"></canvas>
  <div class="vignette"></div>

  <div class="overlay">
    <div class="top-bar">
      <img src="logo.png" alt="Civitas Cerebrum" />
      <div class="brand-words">
        <div class="wm">Civitas Cerebrum</div>
        <div class="sub">Magnum Opus · Autonomous QA</div>
      </div>
    </div>

    <div class="center">
      <div class="eyebrow"><span class="num">I.</span>Bugs in. Order out.</div>
      <h1>Where bugs go <span class="italic">to die.</span></h1>
      <p class="tagline">
        <strong>Magnum Opus</strong> is an autonomous QA agent that finds,
        reproduces, and reports bugs before your users do — relentlessly,
        on every pull request.
      </p>
    </div>

    <div class="bottom">
      <div class="hint"><span class="pulse"></span>Click anywhere to enter</div>
      <button class="skip" id="skip" type="button">Skip intro →</button>
    </div>
  </div>

  <div class="fade" id="fade"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    const SITE_URL = 'site.html';
    const AUTO_DURATION_MS = 4500;

    // ── Skip on return within session ──────────────────────────────
    try {
      if (sessionStorage.getItem('civitas_intro_seen') === '1') {
        location.replace(SITE_URL);
      }
    } catch (_) { /* private mode: just play it */ }

    // ── WebGL availability check ───────────────────────────────────
    function hasWebGL() {
      try {
        const c = document.createElement('canvas');
        return !!(window.WebGLRenderingContext &&
          (c.getContext('webgl') || c.getContext('experimental-webgl')));
      } catch (e) { return false; }
    }

    const fadeEl = document.getElementById('fade');
    const skipBtn = document.getElementById('skip');

    if (!hasWebGL()) {
      // No 3D? Just send them straight in.
      try { sessionStorage.setItem('civitas_intro_seen', '1'); } catch (_) {}
      location.replace(SITE_URL);
    }

    let THREE;
    try {
      THREE = await import('three');
    } catch (e) {
      console.error('Three.js failed to load:', e);
      try { sessionStorage.setItem('civitas_intro_seen', '1'); } catch (_) {}
      location.replace(SITE_URL);
    }

    // ── Transition handler ─────────────────────────────────────────
    let transitioning = false;
    let transitionStart = 0;
    function transition() {
      if (transitioning) return;
      transitioning = true;
      transitionStart = performance.now();
      try { sessionStorage.setItem('civitas_intro_seen', '1'); } catch (_) {}
      fadeEl.classList.add('on');
      setTimeout(() => { location.href = SITE_URL; }, 1100);
    }

    document.addEventListener('click', transition);
    document.addEventListener('keydown', transition);
    document.addEventListener('touchstart', transition, { passive: true });
    skipBtn.addEventListener('click', (e) => { e.stopPropagation(); transition(); });
    setTimeout(transition, AUTO_DURATION_MS);

    // ── Scene setup ────────────────────────────────────────────────
    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x040409);
    scene.fog = new THREE.FogExp2(0x040409, 0.006);

    const camera = new THREE.PerspectiveCamera(
      48, window.innerWidth / window.innerHeight, 0.1, 800
    );
    const camStart = new THREE.Vector3(0, 18, 62);
    const camEnd   = new THREE.Vector3(0, 7.5, 30);
    camera.position.copy(camStart);
    camera.lookAt(0, 0, 0);

    // ── Reusable soft-dot texture (for particles) ──────────────────
    function makeDotTexture() {
      const size = 64;
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      g.addColorStop(0,   'rgba(255,255,255,1)');
      g.addColorStop(0.35,'rgba(255,255,255,0.55)');
      g.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);
      const tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    }
    const dotTex = makeDotTexture();

    // ── Star field ─────────────────────────────────────────────────
    function buildStars(count, radius) {
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(count * 3);
      const col = new Float32Array(count * 3);
      const tmp = new THREE.Color();
      for (let i = 0; i < count; i++) {
        const r = radius * (0.55 + Math.random() * 0.45);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        pos[i*3+0] = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i*3+2] = r * Math.cos(phi);
        // mostly cool/bone, sprinkle of copper
        if (Math.random() < 0.08) {
          tmp.setHSL(0.08, 0.6, 0.55 + Math.random() * 0.3);
        } else {
          tmp.setHSL(0.6 + Math.random() * 0.1, 0.05, 0.6 + Math.random() * 0.4);
        }
        col[i*3+0] = tmp.r; col[i*3+1] = tmp.g; col[i*3+2] = tmp.b;
      }
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
      return geo;
    }
    const stars = new THREE.Points(
      buildStars(2400, 320),
      new THREE.PointsMaterial({
        size: 1.2,
        map: dotTex,
        vertexColors: true,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      })
    );
    scene.add(stars);

    // ── Event horizon (pure black sphere) ─────────────────────────
    const horizonR = 3.0;
    const horizon = new THREE.Mesh(
      new THREE.SphereGeometry(horizonR, 64, 64),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    scene.add(horizon);

    // ── Subtle indigo rim glow behind sphere ──────────────────────
    const rim = new THREE.Mesh(
      new THREE.SphereGeometry(horizonR * 1.12, 64, 64),
      new THREE.ShaderMaterial({
        uniforms: { uColor: { value: new THREE.Color(0x3a1f4d) } },
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vView;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 mv = modelViewMatrix * vec4(position, 1.0);
            vView = normalize(-mv.xyz);
            gl_Position = projectionMatrix * mv;
          }
        `,
        fragmentShader: `
          uniform vec3 uColor;
          varying vec3 vNormal;
          varying vec3 vView;
          void main() {
            float f = pow(1.0 - max(dot(vNormal, vView), 0.0), 3.2);
            gl_FragColor = vec4(uColor * f * 1.4, f * 0.9);
          }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.BackSide,
      })
    );
    scene.add(rim);

    // ── Photon ring (bright copper torus around event horizon) ────
    const photonRing = new THREE.Mesh(
      new THREE.TorusGeometry(horizonR * 1.13, 0.14, 24, 220),
      new THREE.MeshBasicMaterial({
        color: 0xffe1a8,
        transparent: true,
        opacity: 0.95,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      })
    );
    photonRing.rotation.x = Math.PI / 2;
    scene.add(photonRing);

    // outer soft halo
    const haloRing = new THREE.Mesh(
      new THREE.TorusGeometry(horizonR * 1.22, 0.42, 24, 220),
      new THREE.MeshBasicMaterial({
        color: 0xd97706,
        transparent: true,
        opacity: 0.35,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      })
    );
    haloRing.rotation.x = Math.PI / 2;
    scene.add(haloRing);

    // ── Accretion disk (per-particle Keplerian orbit) ─────────────
    const DISK_COUNT = 6000;
    const diskGeo = new THREE.BufferGeometry();
    const diskPos = new Float32Array(DISK_COUNT * 3);
    const diskCol = new Float32Array(DISK_COUNT * 3);
    const diskR = new Float32Array(DISK_COUNT);
    const diskA = new Float32Array(DISK_COUNT);
    const diskOmega = new Float32Array(DISK_COUNT);
    const diskY = new Float32Array(DISK_COUNT);

    const INNER_R = horizonR * 1.25;
    const OUTER_R = 14.5;

    for (let i = 0; i < DISK_COUNT; i++) {
      // bias density toward inner edge
      const t = Math.pow(Math.random(), 1.8);
      const r = INNER_R + t * (OUTER_R - INNER_R);
      const a = Math.random() * Math.PI * 2;
      // thinner near the inner edge, thicker at the outer
      const thickness = 0.15 + (1 - t) * 0.05 + t * 0.6;
      const y = (Math.random() - 0.5) * thickness;
      diskR[i] = r;
      diskA[i] = a;
      diskY[i] = y;
      // Keplerian-ish: faster near center
      diskOmega[i] = 1.6 / Math.sqrt(r);
      diskPos[i*3+0] = Math.cos(a) * r;
      diskPos[i*3+1] = y;
      diskPos[i*3+2] = Math.sin(a) * r;

      // Color: hot white at inner edge → yellow → orange → copper → dim red
      let cr, cg, cb;
      if (t < 0.10) {
        cr = 1.0; cg = 0.96; cb = 0.85;
      } else if (t < 0.32) {
        const k = (t - 0.10) / 0.22;
        cr = 1.0; cg = 0.85 - k * 0.25; cb = 0.55 - k * 0.35;
      } else if (t < 0.65) {
        const k = (t - 0.32) / 0.33;
        cr = 0.95 - k * 0.15; cg = 0.50 - k * 0.20; cb = 0.18 - k * 0.05;
      } else {
        const k = (t - 0.65) / 0.35;
        cr = 0.70 - k * 0.30; cg = 0.25 - k * 0.15; cb = 0.10 - k * 0.05;
      }
      const intensity = 0.55 + Math.random() * 0.55;
      diskCol[i*3+0] = cr * intensity;
      diskCol[i*3+1] = cg * intensity;
      diskCol[i*3+2] = cb * intensity;
    }
    diskGeo.setAttribute('position', new THREE.BufferAttribute(diskPos, 3));
    diskGeo.setAttribute('color', new THREE.BufferAttribute(diskCol, 3));

    const disk = new THREE.Points(diskGeo, new THREE.PointsMaterial({
      size: 0.34,
      map: dotTex,
      vertexColors: true,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      sizeAttenuation: true,
    }));
    scene.add(disk);

    // ── Bug sprite textures (3 hand-drawn variants) ───────────────
    function makeBugTexture(variant) {
      const size = 128;
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.translate(size / 2, size / 2);

      const bodyColor = variant === 0 ? '#1a1a24'
                      : variant === 1 ? '#2a1810'
                      : '#1d0f14';
      const accent    = variant === 0 ? '#d97706'
                      : variant === 1 ? '#d4a72c'
                      : '#b87333';

      // outer shadow halo (gives sprite a faint glow on dark bg)
      const halo = ctx.createRadialGradient(0, 0, 8, 0, 0, 58);
      halo.addColorStop(0, 'rgba(0,0,0,0.0)');
      halo.addColorStop(0.6, 'rgba(0,0,0,0.0)');
      halo.addColorStop(1, 'rgba(0,0,0,0.0)');
      ctx.fillStyle = halo;
      ctx.fillRect(-64, -64, 128, 128);

      // legs (3 per side)
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      const legYs = [-14, 4, 22];
      for (const y of legYs) {
        ctx.beginPath();
        ctx.moveTo(-13, y);
        ctx.quadraticCurveTo(-32, y - 4, -42, y + 14);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(13, y);
        ctx.quadraticCurveTo(32, y - 4, 42, y + 14);
        ctx.stroke();
      }

      // body (oval)
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, 6, 20, 30, 0, 0, Math.PI * 2);
      ctx.fill();

      // body outline (subtle highlight)
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // wing-case stripe
      ctx.strokeStyle = accent;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(0, -18);
      ctx.lineTo(0, 32);
      ctx.stroke();

      // accent dots on wing-case
      if (variant === 1) {
        ctx.fillStyle = accent;
        ctx.beginPath(); ctx.arc(-8, 6,  2.4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc( 8, 6,  2.4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-8, 18, 2.4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc( 8, 18, 2.4, 0, Math.PI * 2); ctx.fill();
      }

      // head
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(0, -22, 12, 0, Math.PI * 2);
      ctx.fill();

      // eyes
      ctx.fillStyle = accent;
      ctx.beginPath(); ctx.arc(-4.5, -24, 2.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 4.5, -24, 2.3, 0, Math.PI * 2); ctx.fill();

      // antennae
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 2.6;
      ctx.beginPath();
      ctx.moveTo(-5, -30);
      ctx.quadraticCurveTo(-14, -44, -19, -54);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(5, -30);
      ctx.quadraticCurveTo(14, -44, 19, -54);
      ctx.stroke();
      // antenna tips
      ctx.fillStyle = accent;
      ctx.beginPath(); ctx.arc(-19, -54, 2.6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 19, -54, 2.6, 0, Math.PI * 2); ctx.fill();

      const tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      tex.anisotropy = 4;
      return tex;
    }
    const bugTextures = [makeBugTexture(0), makeBugTexture(1), makeBugTexture(2)];

    // ── Bug particles (sprites spiraling into the horizon) ────────
    const BUG_COUNT = 28;
    class Bug {
      constructor(phaseSeed) {
        const tex = bugTextures[Math.floor(Math.random() * bugTextures.length)];
        const mat = new THREE.SpriteMaterial({
          map: tex,
          transparent: true,
          depthWrite: false,
          color: 0xffffff,
        });
        this.sprite = new THREE.Sprite(mat);
        this.reset(phaseSeed);
        scene.add(this.sprite);
      }
      reset(phaseSeed) {
        this.startR = 22 + Math.random() * 20;
        this.theta = Math.random() * Math.PI * 2;
        this.totalLife = 5.5 + Math.random() * 3.0;
        // staggered starts so they're not all in lockstep
        this.life = (phaseSeed === undefined)
          ? -Math.random() * 2.5
          : -Math.random() * this.totalLife;
        this.baseSize = 1.4 + Math.random() * 1.1;
        this.yOff = (Math.random() - 0.5) * 4;
        this.spriteRot = Math.random() * Math.PI * 2;
        this.spriteSpin = (Math.random() - 0.5) * 2.4;
        this.sprite.material.opacity = 0;
      }
      update(dt) {
        this.life += dt;
        if (this.life < 0) {
          this.sprite.visible = false;
          return;
        }
        if (this.life >= this.totalLife) {
          this.reset();
          return;
        }
        this.sprite.visible = true;

        const t = this.life / this.totalLife;          // 0 → 1
        const eased = 1 - Math.pow(1 - t, 2.8);         // accelerating inward
        const r = this.startR * (1 - eased) + (horizonR * 0.9) * eased;
        // angular velocity climbs hard near the horizon
        this.theta += dt * (0.35 + 5.5 * eased);

        const x = Math.cos(this.theta) * r;
        const z = Math.sin(this.theta) * r;
        const y = this.yOff * (1 - eased * 0.85);
        this.sprite.position.set(x, y, z);

        // shrink + tumble as it falls in
        const s = this.baseSize * (1.0 - eased * 0.7);
        this.sprite.scale.set(s, s, 1);

        this.spriteRot += dt * this.spriteSpin * (1 + eased * 5);
        this.sprite.material.rotation = this.spriteRot;

        // fade in fast, fade out at the horizon
        let op;
        if (t < 0.08)      op = t / 0.08;
        else if (t > 0.88) op = Math.max(0, (1 - t) / 0.12);
        else               op = 1;
        this.sprite.material.opacity = op;
      }
    }
    const bugs = [];
    for (let i = 0; i < BUG_COUNT; i++) bugs.push(new Bug(i));

    // ── Update accretion disk positions (per-particle orbit) ──────
    function updateDisk(dt) {
      const arr = diskGeo.attributes.position.array;
      for (let i = 0; i < DISK_COUNT; i++) {
        diskA[i] += diskOmega[i] * dt;
        const r = diskR[i], a = diskA[i];
        arr[i*3+0] = Math.cos(a) * r;
        arr[i*3+2] = Math.sin(a) * r;
        // y stays
      }
      diskGeo.attributes.position.needsUpdate = true;
    }

    // ── Resize handling ───────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Main loop ─────────────────────────────────────────────────
    const clock = new THREE.Clock();
    const startTime = performance.now();
    const DOLLY_DURATION = 3.2; // seconds for opening dolly

    function loop() {
      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = (performance.now() - startTime) / 1000;

      // Disk: per-particle orbital update (shear shows motion)
      updateDisk(dt);

      // Bugs
      for (const b of bugs) b.update(dt);

      // Stars: very slow rotation
      stars.rotation.y += dt * 0.006;
      stars.rotation.x += dt * 0.002;

      // Camera: opening dolly + gentle parallax
      if (!transitioning) {
        const t = Math.min(1, elapsed / DOLLY_DURATION);
        const e = 1 - Math.pow(1 - t, 3);
        camera.position.x = camStart.x + (camEnd.x - camStart.x) * e
                          + Math.sin(elapsed * 0.18) * 0.8;
        camera.position.y = camStart.y + (camEnd.y - camStart.y) * e
                          + Math.sin(elapsed * 0.12) * 0.35;
        camera.position.z = camStart.z + (camEnd.z - camStart.z) * e;
      } else {
        // dive into the black hole during the fade
        const tt = Math.min(1, (performance.now() - transitionStart) / 1100);
        const ee = tt * tt;
        camera.position.x += (0 - camera.position.x) * Math.min(1, dt * 2.5);
        camera.position.y += (1.2 - camera.position.y) * Math.min(1, dt * 2.5);
        camera.position.z += (4.5 - camera.position.z) * Math.min(1, dt * 2.5);
        // FOV punch-in adds drama
        camera.fov = 48 + ee * 22;
        camera.updateProjectionMatrix();
      }
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
